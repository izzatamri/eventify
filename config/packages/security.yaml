security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_events
                enable_csrf: true
            logout:
                path: app_logout
                target: app_events
            user_checker: App\Security\UserChecker

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/events/my, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/events/create, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/events/\d+/edit, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/events/\d+/delete, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/events/\d+/tickets, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/events/\d+/publish, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/orders, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
